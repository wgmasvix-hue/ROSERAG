apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: roserag-ingress
  namespace: roserag
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  tls:
    - hosts:
        - roserag.yourdomain.com
        - api.roserag.yourdomain.com
      secretName: roserag-tls
  rules:
    - host: roserag.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-service
                port:
                  number: 3000
    - host: api.roserag.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
---
apiVersion: v1
kind: Secret
metadata:
  name: roserag-secrets
  namespace: roserag
type: Opaque
stringData:
  llm-api-key: "YOUR_LLM_API_KEY_HERE"
  embed-api-key: "YOUR_EMBED_API_KEY_HERE"
  qdrant-api-key: "YOUR_QDRANT_API_KEY_HERE"
