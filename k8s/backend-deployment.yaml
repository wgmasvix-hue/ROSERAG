apiVersion: apps/v1
kind: Deployment
metadata:
  name: roserag-backend
  namespace: roserag
  labels:
    app: roserag-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: roserag-backend
  template:
    metadata:
      labels:
        app: roserag-backend
    spec:
      containers:
        - name: backend
          image: roserag/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: roserag-secrets
                  key: llm-api-key
            - name: EMBED_API_KEY
              valueFrom:
                secretKeyRef:
                  name: roserag-secrets
                  key: embed-api-key
            - name: QDRANT_HOST
              value: qdrant-service
            - name: REDIS_URL
              value: redis://redis-service:6379
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: roserag
spec:
  selector:
    app: roserag-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
